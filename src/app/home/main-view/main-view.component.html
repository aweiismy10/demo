<section>
  <header>
    <h1>作品集首頁</h1>
  </header>
  <form role="search">
    <!-- for配id，點擊label會跳到搜尋框 -->
    <label for="main-search">搜尋:</label>
    <input id="main-search" type="text" (input)="changeData($event)" placeholder="請輸入關鍵字...">
  </form>
  <section class="mat-elevation-z8 table-container">
    <table mat-table [dataSource]="dataSource">

      <!-- Position Column -->
      <ng-container matColumnDef="position">
        <th mat-header-cell *matHeaderCellDef> No. </th>
        <td mat-cell *matCellDef="let element"> {{element.position}} </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> 題目名稱 </th>
        <td mat-cell *matCellDef="let element"> {{element.name}} </td>
      </ng-container>

      <!-- Link Column -->
      <ng-container matColumnDef="link">
        <th mat-header-cell *matHeaderCellDef> 連結 </th>
        <td mat-cell *matCellDef="let element"> <a [routerLink]="element.link" routerLinkActive="active">查看內容</a> </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>
  </section>
</section>
