<div class="web-box">
  <div class="page-box">
    <div class="todolist-box">
      <!-- 標題區域 -->
      <header class="list-header">
        <h1>待辦清單</h1>
      </header>
      <!-- 導航按鈕區域 -->
      <nav class="nav-buttons">
        <button class="nav-btn" routerLink="/todo/list-all">
          <span class="icon">📋</span>
          <span>當前任務清單</span>
        </button>
        <button class="nav-btn" routerLink="/todo/list-pending">
          <span class="icon">⏳</span>
          <span>未完成任務</span>
        </button>
        <button class="nav-btn" routerLink="/todo/add-todo">
          <span class="icon">➕</span>
          <span>新增任務</span>
        </button>
        <button class="nav-btn" routerLink="/todo/mark-done">
          <span class="icon">✅</span>
          <span>標記完成</span>
        </button>
        <button class="nav-btn" routerLink="/todo/delete-todo">
          <span class="icon">❌</span>
          <span>刪除任務</span>
        </button>
      </nav>

      <!-- 內容區域 -->
      <div class="content-list-box">
