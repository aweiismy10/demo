<div class="web-box">
  <div class="page-box">
    <div class="input-box">
      <button (click)="showDialog()">OPEN DIALOG</button>
      <p>name:<input type="text" [(ngModel)]="inputName"></p>
      <p>animal:<input type="text" [(ngModel)]="inputAnimal"></p>
    </div>
    <div class="view-result">
      @for(item of res;track $index){
      <p>{{item}}</p>
      }
    </div>
  </div>
</div>
