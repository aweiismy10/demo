<div class="container">
  <h2>問卷列表</h2>

  <div class="search-box">
    <mat-form-field appearance="outline">
      <mat-label>搜尋問卷標題</mat-label>
      <input matInput placeholder="輸入關鍵字...">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="mat-elevation-z8">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> # </th>
        <td mat-cell *matCellDef="let row"> {{row.id}} </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> 問卷名稱 </th>
        <td mat-cell *matCellDef="let row">
          <a *ngIf="canFill(row.status); else disabledTitle"
             [routerLink]="['/filling', row.id]"
             class="link-active">
            {{row.title}}
          </a>
          <ng-template #disabledTitle>
            <span class="text-muted">{{row.title}}</span>
          </ng-template>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> 狀態 </th>
        <td mat-cell *matCellDef="let row">
          <span class="status-badge" [ngClass]="{
            'ongoing': row.status === SurveyStatus.Ongoing,
            'ended': row.status === SurveyStatus.Ended,
            'not-started': row.status === SurveyStatus.NotStarted
          }">
            {{row.status}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> 開始時間 </th>
        <td mat-cell *matCellDef="let row"> {{row.startDate | date:'yyyy-MM-dd'}} </td>
      </ng-container>

      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> 結束時間 </th>
        <td mat-cell *matCellDef="let row"> {{row.endDate | date:'yyyy-MM-dd'}} </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> 統計 </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary"
                  *ngIf="row.status !== SurveyStatus.NotStarted">
            <mat-icon>bar_chart</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="6">目前沒有問卷資料</td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  </div>
</div>
